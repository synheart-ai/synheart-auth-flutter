name: synheart_auth
description: Flutter plugin for Synheart device authentication — ECDSA P-256 keys backed by iOS Secure Enclave or Android Keystore.
version: 0.1.0
homepage: https://github.com/synheart-ai/synheart-auth-flutter
repository: https://github.com/synheart-ai/synheart-auth-flutter
issue_tracker: https://github.com/synheart-ai/synheart-auth-flutter/issues
license: Apache-2.0
topics:
  - auth
  - flutter
  - ecdsa
  - secure-enclave
  - keystore

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: ai.synheart.auth.flutter
        pluginClass: SynheartAuthPlugin
      ios:
        pluginClass: SynheartAuthPlugin
